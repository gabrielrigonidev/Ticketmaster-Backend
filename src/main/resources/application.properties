spring.application.name=ticketmaster

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/ticketmaster
spring.datasource.username=ticketmaster
spring.datasource.password=ticketmaster
spring.datasource.hikari.maximum-pool-size=16

# JPA — Flyway gerencia o schema; Hibernate apenas valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=public

# Virtual threads (Java 21+)
spring.threads.virtual.enabled=true
